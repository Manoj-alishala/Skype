apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-app
  namespace: chat-app
  labels:
    app: chat-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-app
  template:
    metadata:
      labels:
        app: chat-app
    spec:
      containers:
        - name: chat-app
          # Replace with your Docker Hub / registry image tag after pushing
          image: chat-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          # ── Non-secret config ─────────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: chat-app-config
          # ── Secrets ───────────────────────────────────────────────────────
          env:
            - name: MONGO_DB_URI
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: MONGO_DB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: JWT_SECRET
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: CLOUDINARY_CLOUD_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: chat-app-secrets
                  key: CLOUDINARY_API_SECRET
          # ── Health checks ─────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /api/auth/check
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/check
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
